<script>
  (function(){
    var t = localStorage.getItem("cbb_theme");
    if (t === "light") document.documentElement.setAttribute("data-theme","light");
  })();
  window.addEventListener("pageshow", function(e) {

  });

<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --text:      #c9d1d9;
    --text-dim:  #8b949e;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --red:       #f85149;
    --gold:      #d29922;
  }
  html[data-theme="light"] {
    --bg:        #ffffff;
    --surface:   #f6f8fa;
    --border:    #d0d7de;
    --text:      #1f2328;
    --text-dim:  #656d76;
    --accent:    #0969da;
    --green:     #1a7f37;
    --red:       #cf222e;
    --gold:      #9a6700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header a.back {
    color: var(--accent);
    text-decoration: none;
    font-size: .85rem;
  }
  header a.back:hover { text-decoration: underline; }
  header h1 { font-size: 1.4rem; font-weight: 600; }
  header .sub-info { color: var(--text-dim); font-size: .9rem; margin-left: auto; }
  .theme-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 1.1rem;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color .15s;
    line-height: 1;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  /* player hero card */
  .player-hero {
    max-width: 1200px;
    margin: 24px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .bio-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 28px;
    flex: 1 1 260px;
    min-width: 260px;
  }
  .bio-card .player-name {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .bio-card .team-link {
    color: var(--accent);
    text-decoration: none;
    font-size: .95rem;
  }
  .bio-card .team-link:hover { text-decoration: underline; }
  .bio-meta {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 12px;
    font-size: .85rem;
    color: var(--text-dim);
  }
  .bio-meta span { white-space: nowrap; }
  .bio-meta .label { font-weight: 600; color: var(--text); }

  /* stat cards row */
  .stat-cards {
    flex: 2 1 500px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-content: flex-start;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    text-align: center;
    flex: 1 1 90px;
    min-width: 80px;
  }
  .stat-card .stat-val {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-card .stat-lbl {
    font-size: .7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-top: 2px;
  }

  /* RAPM badge */
  .rapm-card {
    border-color: var(--gold);
  }
  .rapm-card .stat-val { color: var(--gold); }

  /* tabs */
  .tabs {
    max-width: 1200px;
    margin: 24px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 4px;
  }
  .tab-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    color: var(--text-dim);
    padding: 9px 20px;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--bg);
  }

  /* tab content panels */
  .tab-panel {
    display: none;
    max-width: 1200px;
    margin: 0 auto 40px;
    padding: 0 20px;
  }
  .tab-panel.active { display: block; }

  /* table */
  .table-wrap {
    overflow-x: auto;
    margin-top: 16px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .8rem;
  }
  thead { position: sticky; top: 0; z-index: 2; }
  thead th {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .03em;
    padding: 10px 7px;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    text-align: center;
    line-height: 1.25;
  }
  thead th:hover { color: var(--accent); }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: rgba(88,166,255,.06); }
  tbody td {
    padding: 8px 7px;
    white-space: nowrap;
    text-align: center;
  }
  .win { color: var(--green); font-weight: 600; }
  .loss { color: var(--red); font-weight: 600; }

  /* shot chart */
  .shot-chart-container {
    margin-top: 16px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .court-wrap {
    position: relative;
    width: 500px;
    max-width: 100%;
    aspect-ratio: 50 / 47;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .court-wrap canvas {
    width: 100%;
    height: 100%;
  }
  .shot-zones {
    flex: 1 1 280px;
    min-width: 280px;
  }
  .zone-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: .85rem;
  }
  .zone-row:last-child { border-bottom: none; }
  .zone-name { font-weight: 600; }
  .zone-pct {
    font-weight: 700;
    font-size: .95rem;
  }
  .zone-detail { color: var(--text-dim); font-size: .78rem; }

  /* clutch stats */
  .clutch-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-top: 16px;
  }
  .clutch-box h3 {
    font-size: .95rem;
    margin-bottom: 10px;
    color: var(--gold);
  }
  .clutch-stats {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .clutch-stat {
    text-align: center;
  }
  .clutch-stat .val {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent);
  }
  .clutch-stat .lbl {
    font-size: .72rem;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* lineup table */
  .lineup-cell {
    text-align: left !important;
    max-width: 280px;
    white-space: normal !important;
    line-height: 1.35;
  }
  .plus { color: var(--green); font-weight: 600; }
  .minus { color: var(--red); font-weight: 600; }

  /* advanced stats grid */
  .adv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 16px;
  }
  .adv-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .adv-group h4 {
    font-size: .78rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-bottom: 8px;
  }
  .adv-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    font-size: .85rem;
  }
  .adv-row .adv-label { color: var(--text-dim); }
  .adv-row .adv-val { font-weight: 600; }

  /* footer */
  footer {
    max-width: 1200px;
    margin: 40px auto;
    padding: 20px;
    text-align: center;
    font-size: .75rem;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; }

  /* responsive */
  @media (max-width: 700px) {
    header { padding: 14px 16px; }
    .player-hero { padding: 0 12px; gap: 12px; }
    .tabs { padding: 0 12px; overflow-x: auto; }
    .tab-btn { padding: 8px 14px; font-size: .78rem; white-space: nowrap; }
    .tab-panel { padding: 0 12px; }
    .court-wrap { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <a class="back" href="index.html">← Rankings</a>
  <span style="color:var(--text-dim);font-size:.85rem">|</span>
  <a class="back" id="teamLink" href="#">← Team</a>
  <h1 id="playerName">Loading…</h1>
  <span class="sub-info" id="subInfo"></span>
  <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">🌙</button>
</header>

<div class="player-hero" id="heroSection"></div>

<div class="tabs" id="tabsBar">
  <button class="tab-btn active" data-tab="overview">Overview</button>
  <button class="tab-btn" data-tab="gamelog">Game Log</button>
  <button class="tab-btn" data-tab="shotchart">Shot Chart</button>
  <button class="tab-btn" data-tab="lineups">Lineups</button>
</div>

<!-- Overview Tab -->
<div class="tab-panel active" id="panel-overview">
  <div class="adv-grid" id="advGrid"></div>
</div>

<!-- Game Log Tab -->
<div class="tab-panel" id="panel-gamelog">
  <div class="table-wrap">
    <table>
      <thead><tr id="logHeader"></tr></thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>
</div>

<!-- Shot Chart Tab -->
<div class="tab-panel" id="panel-shotchart">
  <div class="shot-chart-container">
    <div class="court-wrap">
      <canvas id="courtCanvas"></canvas>
    </div>
    <div class="shot-zones" id="shotZones"></div>
  </div>
  <div class="clutch-box" id="clutchBox"></div>
</div>

<!-- Lineups Tab -->
<div class="tab-panel" id="panel-lineups">
  <div class="table-wrap">
    <table>
      <thead><tr id="lineupHeader"></tr></thead>
      <tbody id="lineupBody"></tbody>
    </table>
  </div>
</div>

<footer>
  Built by <a href="https://github.com/ai-bracketology">AI Bracketology</a> · Data sourced from ESPN
</footer>

<script>
/* ── theme toggle ── */
(function initTheme() {
  const btn = document.getElementById("themeToggle");
  const isLight = document.documentElement.getAttribute("data-theme") === "light";
  btn.textContent = isLight ? "☀️" : "🌙";
  btn.addEventListener("click", () => {
    const nowLight = document.documentElement.getAttribute("data-theme") === "light";
    if (nowLight) {
      document.documentElement.removeAttribute("data-theme");
      localStorage.setItem("cbb_theme", "dark");
      btn.textContent = "🌙";
    } else {
      document.documentElement.setAttribute("data-theme", "light");
      localStorage.setItem("cbb_theme", "light");
      btn.textContent = "☀️";
    }
    if (typeof drawShotChart === "function") drawShotChart();
  });
})();

/* ── tab switching ── */
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("panel-" + tab).classList.add("active");
    if (tab === "shotchart") drawShotChart();
    gtag('event', 'tab_click', { event_category: 'navigation', event_label: tab, page: 'player' });
  });
});

/* ── get player ID from URL ── */
const params = new URLSearchParams(window.location.search);
const playerId = params.get("id");

if (!playerId) {
  document.getElementById("playerName").textContent = "No player specified";
} else {

fetch("player_data/" + playerId + ".json")
.then(r => { if (!r.ok) throw new Error("Player not found"); return r.json(); })
.then(data => {
  const info = data.info;
  const season = data.season || {};
  const adv = data.advanced || {};
  const rapm = data.rapm;

  /* ── Header ── */
  document.title = info.player_name + " — CBB Ratings 2025-26";
  document.getElementById("playerName").textContent = info.player_name;
  const parts = [];
  if (info.jersey) parts.push("#" + info.jersey);
  if (info.position_abbr) parts.push(info.position_abbr);
  if (info.team_abbr) parts.push(info.team_abbr);
  document.getElementById("subInfo").textContent = parts.join(" · ");

  const teamLink = document.getElementById("teamLink");
  if (info.team_abbr) {
    teamLink.href = "team.html?team=" + info.team_abbr;
    teamLink.textContent = "← " + (info.team_name || info.team_abbr);
  }

  /* ── Hero section ── */
  const hero = document.getElementById("heroSection");

  // Bio card
  let bioHTML = '<div class="bio-card">';
  bioHTML += '<div class="player-name">' + info.player_name + '</div>';
  if (info.team_name) {
    bioHTML += '<a class="team-link" href="team.html?team=' + info.team_abbr + '">' + info.team_name + '</a>';
  }
  bioHTML += '<div class="bio-meta">';
  if (info.position) bioHTML += '<span><span class="label">POS</span> ' + info.position + '</span>';
  if (info.height) bioHTML += '<span><span class="label">HT</span> ' + info.height + '</span>';
  if (info.weight) bioHTML += '<span><span class="label">WT</span> ' + info.weight + ' lbs</span>';
  if (info.experience) bioHTML += '<span><span class="label">YR</span> ' + info.experience + '</span>';
  if (info.jersey) bioHTML += '<span><span class="label">#</span> ' + info.jersey + '</span>';
  bioHTML += '</div></div>';

  // Stat cards
  let cardsHTML = '<div class="stat-cards">';
  const mainStats = [
    { val: season.PPG, lbl: "PPG" },
    { val: season.RPG, lbl: "RPG" },
    { val: season.APG, lbl: "APG" },
    { val: season.SPG, lbl: "SPG" },
    { val: season.BPG, lbl: "BPG" },
    { val: season.MPG, lbl: "MPG" },
  ];
  mainStats.forEach(s => {
    if (s.val != null) {
      cardsHTML += '<div class="stat-card"><div class="stat-val">' +
        Number(s.val).toFixed(1) + '</div><div class="stat-lbl">' + s.lbl + '</div></div>';
    }
  });

  // RAPM cards
  if (rapm) {
    cardsHTML += '<div class="stat-card rapm-card"><div class="stat-val">' +
      Number(rapm.RAPM).toFixed(2) + '</div><div class="stat-lbl">RAPM (#' + rapm.rank + ')</div></div>';
    cardsHTML += '<div class="stat-card"><div class="stat-val">' +
      Number(rapm.ORAPM).toFixed(2) + '</div><div class="stat-lbl">ORAPM</div></div>';
    cardsHTML += '<div class="stat-card"><div class="stat-val">' +
      Number(rapm.DRAPM).toFixed(2) + '</div><div class="stat-lbl">DRAPM</div></div>';
  }
  cardsHTML += '</div>';

  hero.innerHTML = bioHTML + cardsHTML;

  /* ── Overview Tab (advanced stats) ── */
  const grid = document.getElementById("advGrid");
  let gridHTML = '';

  // Shooting group
  gridHTML += '<div class="adv-group"><h4>Shooting</h4>';
  gridHTML += advRow("FG%", pct(season.FG_PCT));
  gridHTML += advRow("3P%", pct(season.TP_PCT));
  gridHTML += advRow("FT%", pct(season.FT_PCT));
  gridHTML += advRow("TS%", pct(season.TS_PCT));
  gridHTML += advRow("eFG%", pct(season.EFG_PCT));
  gridHTML += '</div>';

  // Totals group
  gridHTML += '<div class="adv-group"><h4>Season Totals</h4>';
  gridHTML += advRow("Games", season.GP + (season.GS ? " (" + season.GS + " starts)" : ""));
  gridHTML += advRow("Minutes", season.TOTAL_MIN);
  gridHTML += advRow("Points", season.TOTAL_PTS);
  gridHTML += advRow("Rebounds", season.TOTAL_REB);
  gridHTML += advRow("Assists", season.TOTAL_AST);
  gridHTML += advRow("Steals", season.TOTAL_STL);
  gridHTML += advRow("Blocks", season.TOTAL_BLK);
  gridHTML += advRow("Turnovers", season.TOTAL_TO);
  gridHTML += '</div>';

  // Per-100 group
  if (adv.EST_POSS) {
    gridHTML += '<div class="adv-group"><h4>Per 100 Possessions</h4>';
    gridHTML += advRow("PTS", fix1(adv.PTS_100));
    gridHTML += advRow("REB", fix1(adv.REB_100));
    gridHTML += advRow("AST", fix1(adv.AST_100));
    gridHTML += advRow("STL", fix1(adv.STL_100));
    gridHTML += advRow("BLK", fix1(adv.BLK_100));
    gridHTML += advRow("TO", fix1(adv.TO_100));
    gridHTML += advRow("Est. Poss", adv.EST_POSS);
    gridHTML += '</div>';
  }

  // Usage & Efficiency
  gridHTML += '<div class="adv-group"><h4>Usage & Efficiency</h4>';
  if (adv.USG_PCT) gridHTML += advRow("Usage %", fix1(adv.USG_PCT) + "%");
  gridHTML += advRow("AST/TO", fix2(season.AST_TO));
  gridHTML += advRow("FGM/FGA", season.TOTAL_FGM + "/" + season.TOTAL_FGA);
  gridHTML += advRow("3PM/3PA", season.TOTAL_TPM + "/" + season.TOTAL_TPA);
  gridHTML += advRow("FTM/FTA", season.TOTAL_FTM + "/" + season.TOTAL_FTA);
  gridHTML += '</div>';

  // RAPM group
  if (rapm) {
    gridHTML += '<div class="adv-group"><h4>RAPM Ratings</h4>';
    gridHTML += advRow("Overall RAPM", fix2(rapm.RAPM));
    gridHTML += advRow("Offensive RAPM", fix2(rapm.ORAPM));
    gridHTML += advRow("Defensive RAPM", fix2(rapm.DRAPM));
    gridHTML += advRow("National Rank", "#" + rapm.rank);
    gridHTML += advRow("Total Possessions", rapm.total_poss);
    gridHTML += '</div>';
  }

  grid.innerHTML = gridHTML;

  /* ── Game Log Tab ── */
  const logCols = [
    { key: "date", label: "Date" },
    { key: "opp", label: "Opponent" },
    { key: "loc", label: "Loc" },
    { key: "starter", label: "Start" },
    { key: "MIN", label: "MIN" },
    { key: "PTS", label: "PTS" },
    { key: "FG", label: "FG" },
    { key: "3PT", label: "3PT" },
    { key: "FT", label: "FT" },
    { key: "REB", label: "REB" },
    { key: "AST", label: "AST" },
    { key: "STL", label: "STL" },
    { key: "BLK", label: "BLK" },
    { key: "TO", label: "TO" },
    { key: "PF", label: "PF" },
  ];

  const logHeader = document.getElementById("logHeader");
  logHeader.innerHTML = logCols.map(c => '<th>' + c.label + '</th>').join('');

  const logBody = document.getElementById("logBody");
  const logs = data.game_log || [];
  // Sort most recent first
  logs.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  logBody.innerHTML = logs.map(g => {
    return '<tr>' + logCols.map(c => {
      let val = '';
      switch(c.key) {
        case 'date': val = g.date || ''; break;
        case 'opp': val = g.opp || ''; break;
        case 'loc': val = (g.loc === 'home' ? 'H' : g.loc === 'away' ? 'A' : 'N'); break;
        case 'starter': val = g.starter ? '✓' : ''; break;
        case 'FG': val = g.FGM + '-' + g.FGA; break;
        case '3PT': val = g.TPM + '-' + g.TPA; break;
        case 'FT': val = g.FTM + '-' + g.FTA; break;
        default: val = g[c.key] != null ? g[c.key] : '';
      }
      let cls = '';
      if (c.key === 'PTS' && g.PTS >= 20) cls = ' class="win"';
      return '<td' + cls + '>' + val + '</td>';
    }).join('') + '</tr>';
  }).join('');

  // Add averages row
  if (logs.length > 0) {
    const avg = {};
    ['MIN','PTS','REB','AST','STL','BLK','TO','PF','FGM','FGA','TPM','TPA','FTM','FTA'].forEach(k => {
      avg[k] = logs.reduce((s, g) => s + (g[k] || 0), 0) / logs.length;
    });
    let avgRow = '<tr style="font-weight:700;border-top:2px solid var(--accent)">';
    avgRow += '<td>AVG</td><td></td><td></td><td></td>';
    avgRow += '<td>' + avg.MIN.toFixed(1) + '</td>';
    avgRow += '<td>' + avg.PTS.toFixed(1) + '</td>';
    avgRow += '<td>' + avg.FGM.toFixed(1) + '-' + avg.FGA.toFixed(1) + '</td>';
    avgRow += '<td>' + avg.TPM.toFixed(1) + '-' + avg.TPA.toFixed(1) + '</td>';
    avgRow += '<td>' + avg.FTM.toFixed(1) + '-' + avg.FTA.toFixed(1) + '</td>';
    avgRow += '<td>' + avg.REB.toFixed(1) + '</td>';
    avgRow += '<td>' + avg.AST.toFixed(1) + '</td>';
    avgRow += '<td>' + avg.STL.toFixed(1) + '</td>';
    avgRow += '<td>' + avg.BLK.toFixed(1) + '</td>';
    avgRow += '<td>' + avg.TO.toFixed(1) + '</td>';
    avgRow += '<td>' + avg.PF.toFixed(1) + '</td>';
    avgRow += '</tr>';
    logBody.innerHTML += avgRow;
  }

  /* ── Shot Chart Tab ── */
  window._shotData = data.shots || [];
  window._shotZones = data.shot_zones || {};
  window._clutchData = data.clutch || {};

  // Render zone summary
  const zonesDiv = document.getElementById("shotZones");
  const ZONE_LABELS = {
    rim: "At Rim",
    short_mid: "Short Mid-Range",
    mid: "Mid-Range",
    long_mid: "Long Mid-Range",
    corner_3: "Corner 3",
    three: "Above Break 3",
  };
  const zoneOrder = ["rim", "short_mid", "mid", "long_mid", "corner_3", "three"];
  let totalMade = 0, totalTotal = 0;
  zoneOrder.forEach(z => {
    const d = window._shotZones[z];
    if (d) { totalMade += d.made; totalTotal += d.total; }
  });

  let zonesHTML = '<div class="zone-row" style="font-weight:700">' +
    '<span class="zone-name">All Shots</span>' +
    '<span class="zone-pct">' + (totalTotal ? (totalMade/totalTotal*100).toFixed(1) : 0) + '%</span>' +
    '<span class="zone-detail">' + totalMade + '/' + totalTotal + '</span></div>';

  zoneOrder.forEach(z => {
    const d = window._shotZones[z];
    if (!d || d.total === 0) return;
    const pctVal = (d.made / d.total * 100).toFixed(1);
    const color = d.made / d.total > 0.45 ? 'var(--green)' : d.made / d.total < 0.35 ? 'var(--red)' : 'var(--text)';
    zonesHTML += '<div class="zone-row">' +
      '<span class="zone-name">' + (ZONE_LABELS[z] || z) + '</span>' +
      '<span class="zone-pct" style="color:' + color + '">' + pctVal + '%</span>' +
      '<span class="zone-detail">' + d.made + '/' + d.total + '</span></div>';
  });
  zonesDiv.innerHTML = zonesHTML;

  // Clutch stats
  const clutchBox = document.getElementById("clutchBox");
  const cl = window._clutchData;
  if (cl && cl.total > 0) {
    const clPct = (cl.made / cl.total * 100).toFixed(1);
    clutchBox.innerHTML = '<h3>🔥 Clutch Performance</h3>' +
      '<p style="font-size:.8rem;color:var(--text-dim);margin-bottom:12px">Shots in last 4 minutes of game with margin ≤ 5 points</p>' +
      '<div class="clutch-stats">' +
      '<div class="clutch-stat"><div class="val">' + clPct + '%</div><div class="lbl">FG%</div></div>' +
      '<div class="clutch-stat"><div class="val">' + cl.made + '/' + cl.total + '</div><div class="lbl">Made/Att</div></div>' +
      '<div class="clutch-stat"><div class="val">' + cl.pts + '</div><div class="lbl">Clutch Pts</div></div>' +
      '</div>';
  } else {
    clutchBox.innerHTML = '<h3>🔥 Clutch Performance</h3><p style="color:var(--text-dim);font-size:.85rem">No clutch shots recorded</p>';
  }

  /* ── Lineups Tab ── */
  const lineups = data.lineups || [];
  const luHeader = document.getElementById("lineupHeader");
  luHeader.innerHTML = ['Lineup Partners','Min','Poss','Pts For','Pts Agn','+/-','Off Rtg','Def Rtg','Net Rtg']
    .map(h => '<th>' + h + '</th>').join('');

  const luBody = document.getElementById("lineupBody");
  luBody.innerHTML = lineups.map(lu => {
    const pm = lu.plus_minus;
    const pmClass = pm > 0 ? 'plus' : pm < 0 ? 'minus' : '';
    const pmStr = pm > 0 ? '+' + pm : pm;
    const netClass = lu.net_rtg > 0 ? 'plus' : lu.net_rtg < 0 ? 'minus' : '';
    return '<tr>' +
      '<td class="lineup-cell">' + lu.partners + '</td>' +
      '<td>' + lu.mins + '</td>' +
      '<td>' + lu.poss + '</td>' +
      '<td>' + lu.pts_for + '</td>' +
      '<td>' + lu.pts_against + '</td>' +
      '<td class="' + pmClass + '">' + pmStr + '</td>' +
      '<td>' + lu.off_rtg + '</td>' +
      '<td>' + lu.def_rtg + '</td>' +
      '<td class="' + netClass + '">' + lu.net_rtg + '</td>' +
      '</tr>';
  }).join('');

  if (lineups.length === 0) {
    luBody.innerHTML = '<tr><td colspan="9" style="color:var(--text-dim);padding:20px">No lineup data available</td></tr>';
  }

}).catch(e => {
  document.getElementById("playerName").textContent = "Error: " + e.message;
});
}

/* ── Shot chart drawing ── */
function drawShotChart() {
  const canvas = document.getElementById("courtCanvas");
  if (!canvas) return;
  const shots = window._shotData || [];
  if (shots.length === 0) return;

  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  const W = rect.width;
  const H = rect.height;

  // Clear
  const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--surface').trim();
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, H);

  // Court scaling: ESPN coords x=0-50, y=0-47 (half court)
  const scaleX = W / 50;
  const scaleY = H / 47;

  // Draw court lines
  const lineColor = getComputedStyle(document.documentElement).getPropertyValue('--border').trim();
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 1.5;

  // Baseline
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(W, H);
  ctx.stroke();

  // Paint (lane)
  const laneL = 17 * scaleX, laneR = 33 * scaleX;
  const ftLineY = H - 19 * scaleY;
  ctx.strokeRect(laneL, ftLineY, laneR - laneL, H - ftLineY);

  // Free throw circle
  ctx.beginPath();
  ctx.arc(25 * scaleX, ftLineY, 6 * scaleX, 0, Math.PI * 2);
  ctx.stroke();

  // Three-point arc
  ctx.beginPath();
  // Left corner
  ctx.moveTo(3 * scaleX, H);
  ctx.lineTo(3 * scaleX, H - 14 * scaleY);
  // Arc
  ctx.arc(25 * scaleX, H, 23.5 * scaleX, Math.PI + Math.asin(14 * scaleY / (23.5 * scaleX)),
          -Math.asin(14 * scaleY / (23.5 * scaleX)));
  // Right corner
  ctx.lineTo(47 * scaleX, H);
  ctx.stroke();

  // Basket
  ctx.beginPath();
  ctx.arc(25 * scaleX, H - 1.5 * scaleY, 2 * scaleX, 0, Math.PI * 2);
  ctx.stroke();

  // Draw shots
  const dotR = Math.max(2.5, W / 160);
  shots.forEach(s => {
    // s = [x, y, made, val, clutch]
    let sx = s[0], sy = s[1];
    // Normalize to half-court view (flip if in back court)
    if (sy > 47) { sy = 94 - sy; sx = 50 - sx; }

    const px = sx * scaleX;
    const py = H - sy * scaleY;  // flip Y so baseline is at bottom

    ctx.beginPath();
    ctx.arc(px, py, dotR, 0, Math.PI * 2);
    if (s[2]) {
      // Made shot
      ctx.fillStyle = s[3] === 3 ? "rgba(88,166,255,0.7)" : "rgba(63,185,80,0.7)";
      ctx.fill();
    } else {
      // Missed shot
      ctx.strokeStyle = "rgba(248,81,73,0.5)";
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }
  });
}

/* ── helpers ── */
function advRow(label, val) {
  if (val == null || val === '' || val === 'NaN') val = '–';
  return '<div class="adv-row"><span class="adv-label">' + label + '</span><span class="adv-val">' + val + '</span></div>';
}
function pct(v) { return v != null ? (v * 100).toFixed(1) + '%' : '–'; }
function fix1(v) { return v != null ? Number(v).toFixed(1) : '–'; }
function fix2(v) { return v != null ? Number(v).toFixed(2) : '–'; }
</script>
